name: Update Bird Detections

on:
  schedule:
    - cron: '0 8 * * *'  # runs daily at 18:00 UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          BIRDWEATHER_TOKEN: ${{ secrets.BIRDWEATHER_TOKEN }}
        run: python build-db.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/detections.json
          git diff --staged --quiet || git commit -m "Update bird detections"
          git push
