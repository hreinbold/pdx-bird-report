name: Update Bird Detections

on:
  schedule:
    - cron: '0 9 * * *'   # once daily at 09:00 UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run detection pipeline scripts
        run: |
          python pull-detections.py
          python build-species-buckets.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/detections_all_species.csv data/species_buckets.json
          git diff --staged --quiet || git commit -m "Update bird detections"
          git pull --no-rebase
          git push