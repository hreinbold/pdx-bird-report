name: Update Crow Detections

on:
  schedule:
    - cron: '0 9 * * *'   # once daily at 09:00 UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run crow pipeline scripts
        run: |
          python pull-crow-detections.py
          python build-focus-window.py
          python build-focus-json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crow_detections.csv data/crow_focus_window.csv data/crow_focus_window.json
          git diff --staged --quiet || git commit -m "Update crow detections"
          git pull --no-rebase
          git push