<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDX Bird Report</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    #controls {
  flex-shrink: 0;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

#controls label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

#controls select,
#controls input {
  font-size: 16px;
  padding: 6px;
}

@media (max-width: 600px) {
  #controls {
    flex-direction: column;
    align-items: stretch;
  }

  #controls label {
    width: 100%;
  }

  #controls select,
  #controls input {
    width: 100%;
  }
}
    #chart-wrapper {
      flex-grow: 1;
      overflow-x: auto;
      overflow-y: hidden;
    }
    #chart {
      height: 100%;
      min-width: 900px;
    }
  </style>
</head>
<body>
  <h1>PDX Bird Report</h1>

  <div id="controls">
    <label>Species:
      <select id="species-select">
        <option value="__all__">All species</option>
      </select>
    </label>

    <label>Frequency:
      <select id="freq-select">
        <option value="hour">Hourly</option>
        <option value="day" selected>Daily</option>
        <option value="month">Monthly</option>
      </select>
    </label>

    <label>From: <input type="date" id="from-date"></label>
    <label>To: <input type="date" id="to-date"></label>
  </div>

  <div id="chart-wrapper">
    <div id="chart"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
