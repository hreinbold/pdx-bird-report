<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDX Bird Report</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: sans-serif;
    }

    #top-bar {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #toggle-btn {
      font-size: 20px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    #page-title {
      margin: 0;
      font-size: 20px;
    }

    #view-select {
      margin-left: auto;
      font-size: 16px;
      padding: 6px;
      border-radius: 6px;
    }

    #controls {
      position: fixed;
      top: 50px;
      left: 10px;
      z-index: 999;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #controls.open {
      display: flex;
    }

    #controls select,
    #controls input {
      font-size: 16px;
      padding: 6px;
    }

    #chart-wrapper {
  width: 100%;
  height: 100%;
  padding-top: 60px;
  box-sizing: border-box;
  overflow-x: auto;
  overflow-y: hidden;
}


    #chart {
      height: 100%;
      min-width: 900px;
    }

    #delta-display {
  padding: 70px 20px 20px 20px;
}
  </style>
</head>
<body>
  <div id="top-bar">
    <div id="toggle-btn">☰ Filters</div>
    <h1 id="page-title">PDX Bird Report</h1>
    <select id="view-select">
      <option value="trend" selected>Trend</option>
      <option value="today">Today's Species</option>
      <option value="delta">Yesterday vs Today</option>
    </select>
  </div>

  <div id="controls">
    <div id="trend-only-controls">
      <label>Species:
        <select id="species-select">
          <option value="__all__">All species</option>
        </select>
      </label>

      <label>Frequency:
        <select id="freq-select">
          <option value="hour">Hourly</option>
          <option value="day" selected>Daily</option>
          <option value="month">Monthly</option>
        </select>
      </label>
    </div>

    <label>From: <input type="date" id="from-date"></label>
    <label>To: <input type="date" id="to-date"></label>
  </div>

  <div id="chart-wrapper">
    <div id="chart"></div>
  </div>

  <div id="delta-display"></div>

  <script src="dashboard.js"></script>
</body>
</html>
