<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDX Bird Report</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #top-bar {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 12px;
}

#toggle-btn {
  font-size: 20px;
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

#page-title {
  margin: 0;
  font-size: 20px;
  font-family: sans-serif;
}

    #controls {
      position: fixed;
      top: 50px;
      left: 10px;
      z-index: 999;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #controls.open {
      display: flex;
    }

    #controls select,
    #controls input {
      font-size: 16px;
      padding: 6px;
    }

    #chart-wrapper {
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #chart {
      height: 100%;
      min-width: 900px;
    }
    
    
  </style>
</head>
<body>
  <div id="top-bar">
     <div id="toggle-btn">☰ Filters</div>
     <h1 id="page-title">PDX Bird Report</h1>
  </div>

  <div id="controls">
    <label>Species:
      <select id="species-select">
        <option value="__all__">All species</option>
      </select>
    </label>

    <label>Frequency:
      <select id="freq-select">
        <option value="hour">Hourly</option>
        <option value="day" selected>Daily</option>
        <option value="month">Monthly</option>
      </select>
    </label>

    <label>From: <input type="date" id="from-date"></label>
    <label>To: <input type="date" id="to-date"></label>
  </div>

  <div id="chart-wrapper">
    <div id="chart"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
